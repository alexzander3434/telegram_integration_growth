server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API to Symfony backend (keep UI routes like /shops for Angular SPA)
  location ^~ /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://app:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Fingerprinted assets — long cache (filename changes on each build)
  location ~* \.(?:js|mjs|css|woff2?|ico|png|svg|webp|json)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # SPA: always fetch fresh index shell so new chunk names load after deploy
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
