<div class="mb-6 flex items-start justify-between gap-4">
  <div>
    <a routerLink="/shops" class="text-sm text-slate-600 hover:text-slate-900">
      ← К списку магазинов
    </a>
    <h1 class="mt-2 text-2xl font-semibold tracking-tight">Магазин {{ shopId() }}</h1>
    <p class="mt-1 text-sm text-slate-600">
      Интеграция Telegram и создание заказа для этого магазина.
    </p>
  </div>
</div>

@if (shopIdValid()) {
  <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
    <app-shop-integration #integration [shopId]="shopId()" />
    <app-create-order-widget [shopId]="shopId()" (orderCreated)="integration.loadTelegramStatus()" />
  </div>
} @else {
  <p class="text-sm text-red-600">Некорректный идентификатор магазина.</p>
}
